name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 동일 브랜치 중복 실행 취소 (PR push 연타 시 비용 절약)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: server (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install deps
        run: npm ci

      # server/package.json의 lint 스크립트에 --fix가 박혀 있지만
      # CI 환경에서는 수정해도 커밋되지 않으므로 그냥 둠. exit code만 검사.
      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # jest는 매칭되는 *.spec.ts가 없으면 기본적으로 실패하므로
      # --passWithNoTests로 초기 단계 허용
      - name: Test
        run: npm test -- --passWithNoTests

  client:
    name: client (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install deps
        run: npm ci

      # client에는 lint 스크립트가 없어 tsc 타입 검사로 대체
      - name: Typecheck
        run: npx tsc --noEmit

      # --passWithNoTests: 테스트 파일이 없어도 CI 통과
      - name: Test
        run: npm test
