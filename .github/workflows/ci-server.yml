name: CI / server

on:
  push:
    branches: [main]
    paths: ["server/**"]
  pull_request:
    branches: [main]
    paths: ["server/**"]

concurrency:
  group: ci-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: server (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install deps
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --passWithNoTests
